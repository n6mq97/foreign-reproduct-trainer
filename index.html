<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер перевода</title>
    <style>
        :root {
            --bg: #f4f6f9;
            --panel: #ffffff;
            --accent: #4a90d9;
            --accent-hover: #357abd;
            --active-bg: #e3f2fd;
            --active-border: #2196f3;
            --success-bg: #e8f5e9;
            --success-border: #4caf50;
            --error-bg: #ffebee;
            --error-text: #c62828;
            --text: #2c3e50;
            --text-muted: #7f8c8d;
            --border: #eaecef;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 12px;
            --mobile-keyboard-offset: 0px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .app-header h1 { margin: 0; font-size: 1.4rem; }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .mode-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .mode-switch select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            background: #fff;
            color: var(--text);
            font-size: 0.9rem;
        }

        .btn {
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #f57c00; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }

        .trainer-wrapper {
            flex: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            flex: 1;
            min-height: 0;
            border-bottom: 1px solid var(--border);
        }

        .panel {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .panel h2 {
            margin: 0 0 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            background: var(--panel);
            padding-bottom: 10px;
            z-index: 2;
            border-bottom: 2px solid #eee;
        }

        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .ru-sentence {
            padding: 14px;
            border-radius: 8px;
            background: #f8f9fa;
            border: 2px solid transparent;
            transition: all 0.25s ease;
            line-height: 1.5;
            scroll-margin-top: 12px;
        }
        .ru-sentence.active {
            background: var(--active-bg);
            border-color: var(--active-border);
            box-shadow: 0 2px 8px rgba(33,150,243,0.15);
            font-weight: 500;
            transform: translateX(6px);
        }

        .en-sentence {
            padding: 14px;
            border-radius: 8px;
            background: var(--success-bg);
            border-left: 4px solid var(--success-border);
            animation: fadeIn 0.3s ease;
            line-height: 1.5;
        }
        .placeholder {
            color: var(--text-muted);
            text-align: center;
            margin-top: 40%;
            font-style: italic;
        }

        .input-zone {
            padding: 20px;
            background: #fafbfc;
        }

        #userInput {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            border: 2px solid #e0e4e8;
            border-radius: 8px;
            transition: border-color 0.2s;
            margin-bottom: 12px;
            min-height: 52px;
            max-height: 180px;
            resize: none;
            overflow-y: auto;
            line-height: 1.4;
            font-family: inherit;
        }
        #userInput:focus { outline: none; border-color: var(--accent); }
        input:disabled, textarea:disabled { background: #f1f3f5; color: #a0a5aa; cursor: not-allowed; }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .hidden { display: none !important; }

        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
        }
        .feedback.error { background: var(--error-bg); color: var(--error-text); }
        .feedback.success { background: var(--success-bg); color: #155724; }
        .hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; text-align: center; }
        #enList {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--panel);
            width: 90%; max-width: 700px;
            max-height: 85vh;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h2 { margin: 0; font-size: 1.2rem; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        .text-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border: 1px solid var(--border); border-radius: 8px;
            margin-bottom: 10px; cursor: pointer; transition: background 0.2s;
        }
        .text-item:hover { background: #f8f9fa; }
        .text-item.active { border-color: var(--accent); background: var(--active-bg); }
        .text-info h3 { margin: 0 0 4px; font-size: 1rem; }
        .text-info p { margin: 0; font-size: 0.85rem; color: var(--text-muted); }
        .text-actions { display: flex; gap: 8px; }

        textarea {
            width: 100%; height: 150px; padding: 10px;
            border: 2px solid #e0e4e8; border-radius: 8px;
            font-family: inherit; font-size: 0.95rem; resize: vertical;
            margin-bottom: 10px;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        .dual-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
        }
        .input-group input[type="text"] {
            margin-bottom: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
        }
        .name-input-row {
            margin-bottom: 15px;
        }
        .name-input-row label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: 500; }
        .name-input-row input { margin-bottom: 0; }

        .error-msg {
            color: var(--error-text);
            font-size: 0.9rem;
            margin: 10px 0;
            min-height: 1.2em;
        }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #333; color: white; padding: 12px 18px;
            border-radius: 8px; opacity: 0; transform: translateY(10px);
            transition: all 0.3s; z-index: 200;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            body {
                padding: 0;
                height: 100dvh;
            }
            .app-header {
                margin-bottom: 0;
                padding: 12px 14px;
                background: var(--panel);
                border-bottom: 1px solid var(--border);
            }
            .header-actions {
                justify-content: space-between;
                flex-wrap: wrap;
            }
            .trainer-wrapper {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                margin: 0;
            }
            .panels {
                grid-template-columns: 1fr;
                padding-bottom: 170px;
            }
            .panel {
                max-height: none;
                min-height: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
            .input-zone {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 40;
                background: var(--panel);
                border-top: 1px solid var(--border);
                padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
                transform: translateY(calc(-1 * var(--mobile-keyboard-offset)));
            }
            .modal-content { width: 95%; }
            .dual-input { grid-template-columns: 1fr; }
            #userInput {
                max-height: 140px;
            }
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1>Тренажер перевода</h1>
    <div class="header-actions">
        <label class="mode-switch">
            <span>Режим:</span>
            <select id="trainingMode">
                <option value="normal">Нормальный</option>
                <option value="hard">Сложный</option>
            </select>
        </label>
        <button class="btn btn-primary" id="openManager">📚 Выбрать текст</button>
    </div>
</div>

<div class="trainer-wrapper">
    <div class="panels">
        <div class="panel ru-panel">
            <h2>Исходный текст</h2>
            <div class="sentence-list" id="ruList"></div>
        </div>
        <div class="panel en-panel">
            <h2>Ваш перевод</h2>
            <div class="sentence-list" id="enList">
                <div class="placeholder">Переведённые предложения появятся здесь</div>
            </div>
        </div>
    </div>

    <div class="input-zone">
        <textarea id="userInput" rows="1" placeholder="Введите перевод выделенного предложения..." autocomplete="off"></textarea>
        <div class="controls">
            <button id="checkBtn" class="btn btn-primary">Проверить</button>
            <button id="gotItBtn" class="btn btn-warning hidden">Понял</button>
            <button id="restartBtn" class="btn btn-secondary hidden">Начать заново</button>
        </div>
        <div id="feedback" class="feedback hidden"></div>
        <div class="hint">Нажмите Enter для проверки</div>
    </div>
</div>

<!-- Modal Manager -->
<div class="modal-overlay" id="managerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Управление текстами</h2>
            <button class="btn btn-sm btn-secondary" id="closeModal">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="text">Вставка текста</button>
                <button class="tab-btn" data-tab="json">JSON импорт</button>
            </div>

            <!-- Tab: Text Input -->
            <div id="tab-text" class="tab-content">
                <div class="name-input-row">
                    <label>Название текста (опционально)</label>
                    <input type="text" id="textNameText" placeholder="Например: Новости BBC, Глава 1...">
                </div>
                <div class="dual-input">
                    <div class="input-group">
                        <label>Код языка (опц.)</label>
                        <input type="text" id="srcLang" placeholder="RU" value="RU">
                        <textarea id="srcText" placeholder="Вставьте исходный текст..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>Код языка перевода (опц.)</label>
                        <input type="text" id="trgLang" placeholder="EN" value="EN">
                        <textarea id="trgText" placeholder="Вставьте переведенный текст..."></textarea>
                    </div>
                </div>
                <div id="textError" class="error-msg"></div>
                <button class="btn btn-primary" id="addTextBtnText" style="width:100%">Разобрать и сохранить</button>
            </div>

            <!-- Tab: JSON Input -->
            <div id="tab-json" class="tab-content hidden">
                <p style="margin-top:0; color: var(--text-muted); font-size: 0.9rem;">Вставьте JSON массив:</p>
                <textarea id="jsonInput" placeholder='[
  {
    "title": "Базовые фразы",
    "sentences": [
      { "ru": "Привет.", "en": "Hi." },
      { "ru": "Как дела?", "en": "How are you?" }
    ]
  },
  {
    "title": "Офис",
    "sentences": [
      { "ru": "Я отправил письмо.", "en": "I sent the email." }
    ]
  }
]'></textarea>
                <div id="jsonError" class="error-msg"></div>
                <button class="btn btn-primary" id="saveJson" style="width:100%; margin-bottom: 10px;">Сохранить JSON</button>
                <button class="btn btn-secondary" id="exportJson" style="width:100%">Экспортировать все тексты</button>
            </div>

            <!-- List -->
            <h3 style="margin: 25px 0 10px; font-size: 1rem;">Сохраненные тексты</h3>
            <div id="textList"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ==================== УТИЛИТЫ И ХРАНИЛИЩЕ ====================
    const STORAGE_KEYS = {
        TEXTS: 'trainer_texts',
        PROGRESS: 'trainer_progress',
        ACTIVE_ID: 'trainer_active_id',
        MODE: 'trainer_mode'
    };
    const DEFAULT_TEXTS_FILE = './default-texts.json';

    function loadFromStorage(key, fallback) {
        try {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : fallback;
        } catch { return fallback; }
    }

    function saveToStorage(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function hashArray(arr) {
        const str = JSON.stringify(arr.map(s => `${s.ru}|${s.en}`));
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(36);
    }

    function normalizeTextName(name) {
        return String(name || '').trim().toLowerCase();
    }

    function getProgressKey(text) {
        return normalizeTextName(text?.name);
    }

    function migrateProgressToTextNames(textItems, progressMap) {
        const nextProgress = { ...(progressMap || {}) };
        const textById = new Map(textItems.map(text => [text.id, text]));
        let changed = false;

        Object.keys(nextProgress).forEach((key) => {
            if (textById.has(key)) {
                const text = textById.get(key);
                const nameKey = getProgressKey(text);
                if (nameKey && !nextProgress[nameKey]) {
                    nextProgress[nameKey] = nextProgress[key];
                }
                delete nextProgress[key];
                changed = true;
            }
        });

        return { progress: nextProgress, changed };
    }

    // Надёжное разбиение текста на предложения
    function splitIntoSentences(text) {
        if (!text || !text.trim()) return [];
        // Заменяем точку/воскл/вопрос+пробел на разделитель, затем бьём по строкам и разделителям
        return text.replace(/([.!?])\s+/g, "$1|")
                   .split("\n")
                   .map(line => line.split("|"))
                   .flat()
                   .map(s => s.trim())
                   .filter(s => s.length > 0);
    }

    // ==================== ДАННЫЕ ПО УМОЛЧАНИЮ ====================
    async function loadDefaultTexts() {
        try {
            const response = await fetch(DEFAULT_TEXTS_FILE, { cache: 'no-store' });
            if (!response.ok) return [];
            const data = await response.json();
            if (!Array.isArray(data)) return [];
            return data
                .map((entry, index) => {
                    const title = typeof entry?.title === 'string' ? entry.title.trim() : '';
                    const sentences = Array.isArray(entry?.sentences)
                        ? entry.sentences.filter(item => typeof item?.ru === 'string' && typeof item?.en === 'string')
                        : [];
                    if (!title || !sentences.length) return null;
                    const content = sentences.map(sentence => ({ ru: sentence.ru.trim(), en: sentence.en.trim() }))
                        .filter(sentence => sentence.ru && sentence.en);
                    if (!content.length) return null;
                    return {
                        id: `default_${String(index + 1).padStart(3, '0')}`,
                        name: title,
                        content,
                        hash: hashArray(content)
                    };
                })
                .filter(Boolean);
        } catch {
            return [];
        }
    }

    async function initStorage() {
        let texts = loadFromStorage(STORAGE_KEYS.TEXTS, []);
        const defaultTexts = await loadDefaultTexts();
        if (defaultTexts.length) {
            const existingHashes = new Set(texts.map(t => t.hash));
            const existingNames = new Set(texts.map(t => normalizeTextName(t.name)));
            const mergedDefaults = defaultTexts.filter((text) => {
                const nameKey = normalizeTextName(text.name);
                return !existingHashes.has(text.hash) && !existingNames.has(nameKey);
            });
            if (mergedDefaults.length) {
                texts = [...texts, ...mergedDefaults];
                saveToStorage(STORAGE_KEYS.TEXTS, texts);
            }
        }
        if (texts.length && !loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '')) {
            saveToStorage(STORAGE_KEYS.ACTIVE_ID, texts[0].id);
        }

        const savedProgress = loadFromStorage(STORAGE_KEYS.PROGRESS, {});
        const migrationResult = migrateProgressToTextNames(texts, savedProgress);
        if (migrationResult.changed) {
            saveToStorage(STORAGE_KEYS.PROGRESS, migrationResult.progress);
        }
    }

    // ==================== МЕНЕДЖЕР ТЕКСТОВ ====================
    let texts = [];
    let activeTextId = '';

    const managerModal = document.getElementById('managerModal');
    const textListEl = document.getElementById('textList');

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            btn.classList.add('active');
            document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
            document.getElementById('textError').textContent = '';
            document.getElementById('jsonError').textContent = '';
        });
    });

    document.getElementById('openManager').onclick = () => {
        texts = loadFromStorage(STORAGE_KEYS.TEXTS, []);
        activeTextId = loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '');
        renderTextList();
        managerModal.classList.add('open');
    };

    document.getElementById('closeModal').onclick = () => managerModal.classList.remove('open');

    // --- Text Input ---
    document.getElementById('addTextBtnText').onclick = () => {
        const srcRaw = document.getElementById('srcText').value;
        const trgRaw = document.getElementById('trgText').value;
        const srcLang = document.getElementById('srcLang').value.trim();
        const trgLang = document.getElementById('trgLang').value.trim();
        const customName = document.getElementById('textNameText').value.trim();
        const errEl = document.getElementById('textError');
        errEl.textContent = '';

        if (!srcRaw.trim() || !trgRaw.trim()) {
            errEl.textContent = 'Заполните оба текстовых поля.';
            return;
        }

        const srcSentences = splitIntoSentences(srcRaw);
        const trgSentences = splitIntoSentences(trgRaw);

        if (srcSentences.length !== trgSentences.length) {
            errEl.textContent = `Несоответствие: Оригинал (${srcSentences.length}) ≠ Перевод (${trgSentences.length}). Проверьте пунктуацию.`;
            return;
        }

        const content = srcSentences.map((ru, i) => ({ ru, en: trgSentences[i] }));
        const hash = hashArray(content);
        const newName = (customName || `${srcLang || 'A'} -> ${trgLang || 'B'} (${content.length} предложений)`).trim();
        const newNameKey = normalizeTextName(newName);
        
        if (texts.some(t => t.hash === hash)) {
            errEl.textContent = 'Такой текст уже сохранен.';
            return;
        }
        if (texts.some(t => normalizeTextName(t.name) === newNameKey)) {
            errEl.textContent = 'Текст с таким названием уже существует.';
            return;
        }

        const newText = {
            id: 'txt_' + Date.now().toString(36),
            name: newName,
            content,
            hash
        };

        texts.push(newText);
        saveToStorage(STORAGE_KEYS.TEXTS, texts);
        
        document.getElementById('srcText').value = '';
        document.getElementById('trgText').value = '';
        document.getElementById('textNameText').value = '';
        
        renderTextList();
        showToast('Текст успешно добавлен');
    };

    // --- JSON Input ---
    document.getElementById('saveJson').onclick = () => {
        const errEl = document.getElementById('jsonError');
        errEl.textContent = '';
        
        try {
            const data = JSON.parse(document.getElementById('jsonInput').value);
            if (!Array.isArray(data)) throw new Error('JSON должен быть массивом []');
            if (data.length === 0) throw new Error('Массив не должен быть пустым');
            texts = loadFromStorage(STORAGE_KEYS.TEXTS, []);
            let importedCount = 0;
            let duplicateCount = 0;

            data.forEach((entry, i) => {
                if (!entry || typeof entry !== 'object') {
                    throw new Error(`Элемент ${i + 1} должен быть объектом`);
                }
                if (!entry.title || typeof entry.title !== 'string') {
                    throw new Error(`Элемент ${i + 1}: поле "title" обязательно и должно быть строкой`);
                }
                if (!Array.isArray(entry.sentences) || entry.sentences.length === 0) {
                    throw new Error(`Элемент ${i + 1}: поле "sentences" должно быть непустым массивом`);
                }

                entry.sentences.forEach((sentence, j) => {
                    if (!sentence || typeof sentence !== 'object') {
                        throw new Error(`Элемент ${i + 1}, предложение ${j + 1} должно быть объектом`);
                    }
                    if (typeof sentence.ru !== 'string' || typeof sentence.en !== 'string' || !sentence.ru.trim() || !sentence.en.trim()) {
                        throw new Error(`Элемент ${i + 1}, предложение ${j + 1} должно содержать непустые строки "ru" и "en"`);
                    }
                });

                const normalizedContent = entry.sentences.map(sentence => ({
                    ru: sentence.ru.trim(),
                    en: sentence.en.trim()
                }));
                const normalizedTitle = entry.title.trim();
                const normalizedTitleKey = normalizeTextName(normalizedTitle);
                if (!normalizedTitleKey) {
                    throw new Error(`Элемент ${i + 1}: поле "title" не должно быть пустым`);
                }
                if (texts.some(t => normalizeTextName(t.name) === normalizedTitleKey)) {
                    throw new Error(`Элемент ${i + 1}: текст с названием "${normalizedTitle}" уже существует`);
                }
                const hash = hashArray(normalizedContent);
                if (texts.some(t => t.hash === hash)) {
                    duplicateCount++;
                    return;
                }

                texts.push({
                    id: 'txt_' + Date.now().toString(36) + '_' + importedCount.toString(36),
                    name: normalizedTitle,
                    content: normalizedContent,
                    hash
                });
                importedCount++;
            });

            if (importedCount === 0 && duplicateCount > 0) {
                throw new Error('Все тексты из JSON уже существуют.');
            }

            saveToStorage(STORAGE_KEYS.TEXTS, texts);
            document.getElementById('jsonInput').value = '';
            renderTextList();
            if (duplicateCount > 0) {
                showToast(`Импортировано: ${importedCount}. Пропущено дублей: ${duplicateCount}`);
            } else {
                showToast(`Импортировано текстов: ${importedCount}`);
            }
        } catch (err) {
            errEl.textContent = '❌ ' + err.message;
        }
    };

    document.getElementById('exportJson').onclick = () => {
        const exportData = loadFromStorage(STORAGE_KEYS.TEXTS, []).map(text => ({
            title: text.name,
            sentences: (text.content || []).map(sentence => ({
                ru: sentence.ru,
                en: sentence.en
            }))
        }));

        if (!exportData.length) {
            showToast('Нет текстов для экспорта');
            return;
        }

        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        const now = new Date();
        const datePart = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        link.href = url;
        link.download = `trainer-texts-${datePart}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showToast('Экспорт завершен');
    };

    function renderTextList() {
        // Всегда берем свежие данные
        texts = loadFromStorage(STORAGE_KEYS.TEXTS, []);
        const migrationResult = migrateProgressToTextNames(texts, loadFromStorage(STORAGE_KEYS.PROGRESS, {}));
        const progress = migrationResult.progress;
        if (migrationResult.changed) {
            saveToStorage(STORAGE_KEYS.PROGRESS, progress);
        }
        textListEl.innerHTML = '';
        if (texts.length === 0) {
            textListEl.innerHTML = '<p style="text-align:center; color:var(--text-muted)">Нет сохранённых текстов</p>';
            return;
        }
        texts.forEach((t, index) => {
            const total = t.content.length;
            const current = Math.min(progress[getProgressKey(t)]?.currentIndex ?? 0, total);
            const percent = total > 0 ? Math.round((current / total) * 100) : 0;
            const div = document.createElement('div');
            div.className = `text-item ${t.id === activeTextId ? 'active' : ''}`;
            div.innerHTML = `
                <div class="text-info">
                    <h3>${index + 1}. ${t.name}</h3>
                    <p>${total} предложений • Прогресс: ${current}/${total} (${percent}%)</p>
                </div>
                <div class="text-actions">
                    <button class="btn btn-sm btn-primary load-text-btn" data-id="${t.id}">Загрузить</button>
                    ${!t.id.startsWith('default_') ? `<button class="btn btn-sm btn-danger delete-text-btn" data-id="${t.id}">Удалить</button>` : ''}
                </div>
            `;
            textListEl.appendChild(div);
        });

        textListEl.querySelectorAll('.load-text-btn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); selectText(btn.dataset.id); };
        });
        textListEl.querySelectorAll('.delete-text-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                if (confirm('Удалить этот текст? Прогресс будет потерян.')) deleteText(btn.dataset.id);
            };
        });
    }

    function selectText(id) {
        saveToStorage(STORAGE_KEYS.ACTIVE_ID, id);
        activeTextId = id;
        initTrainer();
        managerModal.classList.remove('open');
        showToast('Текст загружен');
    }

    function deleteText(id) {
        const removedText = texts.find(t => t.id === id);
        texts = texts.filter(t => t.id !== id);
        saveToStorage(STORAGE_KEYS.TEXTS, texts);
        const progress = loadFromStorage(STORAGE_KEYS.PROGRESS, {});
        if (removedText) {
            delete progress[getProgressKey(removedText)];
        }
        saveToStorage(STORAGE_KEYS.PROGRESS, progress);
        
        if (activeTextId === id) {
            const fallback = texts.length > 0 ? texts[0].id : 'default_001';
            selectText(fallback);
        }
        renderTextList();
    }

    // ==================== ЛОГИКА ТРЕНАЖЕРА ====================
    let currentContent = [];
    let currentIndex = 0;
    let isWaitingForGotIt = false;
    let isFinished = false;
    let trainingMode = loadFromStorage(STORAGE_KEYS.MODE, 'normal');

    const ruList = document.getElementById('ruList');
    const enList = document.getElementById('enList');
    const userInput = document.getElementById('userInput');
    const checkBtn = document.getElementById('checkBtn');
    const gotItBtn = document.getElementById('gotItBtn');
    const restartBtn = document.getElementById('restartBtn');
    const feedback = document.getElementById('feedback');
    const trainingModeEl = document.getElementById('trainingMode');
    const isMobile = window.matchMedia('(max-width: 768px)');

    function resolveTrainingMode(mode) {
        return mode === 'hard' ? 'hard' : 'normal';
    }

    function normalize(str) {
        return str
            .toLowerCase()
            .replace(/[^\p{L}]+/gu, '');
    }

    function resizeUserInput() {
        userInput.style.height = 'auto';
        const nextHeight = Math.min(userInput.scrollHeight, isMobile.matches ? 140 : 180);
        userInput.style.height = `${Math.max(nextHeight, 52)}px`;
    }

    function syncMobileKeyboardOffset() {
        if (!isMobile.matches) {
            document.documentElement.style.setProperty('--mobile-keyboard-offset', '0px');
            return;
        }
        const viewport = window.visualViewport;
        if (!viewport) {
            document.documentElement.style.setProperty('--mobile-keyboard-offset', '0px');
            return;
        }
        const keyboardOffset = Math.max(0, window.innerHeight - viewport.height - viewport.offsetTop);
        document.documentElement.style.setProperty('--mobile-keyboard-offset', `${keyboardOffset}px`);
    }

    function scrollToActiveSentenceOnMobileKeyboard() {
        if (!isMobile.matches) return;
        const activeSentence = document.querySelector('.ru-sentence.active');
        if (!activeSentence) return;
        const activeIndex = Number(activeSentence.dataset.index);
        const targetIndex = Number.isNaN(activeIndex) ? 0 : Math.max(0, activeIndex - 1);
        const targetSentence = document.querySelector(`.ru-sentence[data-index="${targetIndex}"]`) || activeSentence;
        targetSentence.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function initTrainer() {
        texts = loadFromStorage(STORAGE_KEYS.TEXTS, []);
        activeTextId = loadFromStorage(STORAGE_KEYS.ACTIVE_ID, 'default_001');
        const activeText = texts.find(t => t.id === activeTextId) || texts[0];
        
        if (!activeText) {
            alert('Ошибка: текст не найден. Попробуйте добавить новый.');
            return;
        }

        currentContent = activeText.content;
        const migrationResult = migrateProgressToTextNames(texts, loadFromStorage(STORAGE_KEYS.PROGRESS, {}));
        const savedProgress = migrationResult.progress;
        if (migrationResult.changed) {
            saveToStorage(STORAGE_KEYS.PROGRESS, savedProgress);
        }
        currentIndex = savedProgress[getProgressKey(activeText)]?.currentIndex ?? 0;
        
        if (currentIndex >= currentContent.length) currentIndex = 0;
        
        isFinished = false;
        isWaitingForGotIt = false;
        
        renderRU();
        renderEN();
        updateHighlight();
        
        userInput.style.display = 'block';
        userInput.disabled = false;
        userInput.value = '';
        resizeUserInput();
        feedback.className = 'feedback hidden';
        checkBtn.classList.remove('hidden');
        gotItBtn.classList.add('hidden');
        restartBtn.classList.remove('hidden');
    }

    function renderRU() {
        ruList.innerHTML = '';
        currentContent.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'ru-sentence';
            div.textContent = s.ru;
            div.dataset.index = i;
            ruList.appendChild(div);
        });
    }

    function renderEN() {
        enList.innerHTML = '';
        if (currentIndex === 0) {
            enList.innerHTML = '<div class="placeholder">Переведённые предложения появятся здесь</div>';
            return;
        }
        currentContent.slice(0, currentIndex).forEach(s => {
            const div = document.createElement('div');
            div.className = 'en-sentence';
            div.textContent = s.en;
            enList.appendChild(div);
        });
        enList.scrollTop = enList.scrollHeight;
    }

    function updateHighlight() {
        document.querySelectorAll('.ru-sentence').forEach(el => {
            el.classList.toggle('active', parseInt(el.dataset.index) === currentIndex);
        });
        const active = document.querySelector('.ru-sentence.active');
        if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function saveProgress() {
        const activeText = texts.find(t => t.id === activeTextId);
        if (!activeText) return;
        const prog = loadFromStorage(STORAGE_KEYS.PROGRESS, {});
        prog[getProgressKey(activeText)] = { currentIndex };
        saveToStorage(STORAGE_KEYS.PROGRESS, prog);
    }

    function checkAnswer() {
        if (isFinished || isWaitingForGotIt || !userInput.value.trim()) return;

        const userVal = normalize(userInput.value);
        const targetVal = normalize(currentContent[currentIndex].en);
        feedback.classList.add('hidden');

        if (userVal === targetVal) {
            currentIndex++;
            saveProgress();
            renderEN();
            if (currentIndex >= currentContent.length) {
                finishTrainer();
            } else {
                userInput.value = '';
                resizeUserInput();
                updateHighlight();
            }
        } else {
            isWaitingForGotIt = true;
            userInput.disabled = true;
            checkBtn.classList.add('hidden');
            gotItBtn.classList.remove('hidden');
            feedback.className = 'feedback error';
            feedback.innerHTML = `❌ Ошибка. Правильно:<br><strong>${currentContent[currentIndex].en}</strong>`;
        }
    }

    function handleGotIt() {
        if (trainingMode === 'hard') {
            currentIndex = 0;
        } else {
            currentIndex = Math.max(0, currentIndex - 1);
        }
        saveProgress();
        
        isWaitingForGotIt = false;
        userInput.disabled = false;
        gotItBtn.classList.add('hidden');
        checkBtn.classList.remove('hidden');
        feedback.classList.add('hidden');
        
        renderEN(); // Перерисовка справа (удаляет верхнее)
        userInput.value = '';
        resizeUserInput();
        updateHighlight();
        userInput.focus();
    }

    function finishTrainer() {
        isFinished = true;
        userInput.style.display = 'none';
        checkBtn.classList.add('hidden');
        document.querySelectorAll('.ru-sentence').forEach(el => el.classList.remove('active'));
        feedback.className = 'feedback success';
        feedback.textContent = '🎉 Поздравляем! Весь текст успешно переведен.';
    }

    document.getElementById('restartBtn').onclick = () => {
        if (confirm('Сбросить прогресс по этому тексту?')) {
            currentIndex = 0;
            saveProgress();
            initTrainer();
        }
    };

    checkBtn.addEventListener('click', checkAnswer);
    gotItBtn.addEventListener('click', handleGotIt);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            checkAnswer();
        }
    });
    userInput.addEventListener('input', resizeUserInput);
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', syncMobileKeyboardOffset);
        window.visualViewport.addEventListener('scroll', syncMobileKeyboardOffset);
    }
    trainingMode = resolveTrainingMode(trainingMode);
    trainingModeEl.value = trainingMode;
    trainingModeEl.addEventListener('change', () => {
        trainingMode = resolveTrainingMode(trainingModeEl.value);
        saveToStorage(STORAGE_KEYS.MODE, trainingMode);
    });
    window.addEventListener('resize', syncMobileKeyboardOffset);
    userInput.addEventListener('focus', () => {
        syncMobileKeyboardOffset();
        setTimeout(scrollToActiveSentenceOnMobileKeyboard, 80);
        setTimeout(scrollToActiveSentenceOnMobileKeyboard, 260);
    });
    userInput.addEventListener('blur', () => {
        setTimeout(syncMobileKeyboardOffset, 120);
    });

    // Init
    async function bootstrap() {
        await initStorage();
        initTrainer();
        syncMobileKeyboardOffset();
        resizeUserInput();
    }

    bootstrap();
</script>

</body>
</html>
