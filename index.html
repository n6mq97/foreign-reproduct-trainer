<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер перевода</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <style>
        :root {
            --bg: #f4f6f9;
            --panel: #ffffff;
            --accent: #4a90d9;
            --accent-hover: #357abd;
            --active-bg: #e3f2fd;
            --active-border: #2196f3;
            --success-bg: #e8f5e9;
            --success-border: #4caf50;
            --error-bg: #ffebee;
            --error-text: #c62828;
            --text: #2c3e50;
            --text-muted: #7f8c8d;
            --border: #eaecef;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 12px;
            --mobile-keyboard-offset: 0px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .app-header h1 { margin: 0; font-size: 1.4rem; }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .mode-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .mode-switch select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            background: #fff;
            color: var(--text);
            font-size: 0.9rem;
        }

        .btn {
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #f57c00; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }

        .trainer-wrapper {
            flex: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            flex: 1;
            min-height: 0;
            border-bottom: 1px solid var(--border);
        }

        .panel {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding-top: 0px;
        }

        .panel h2 {
            margin: 0 0 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            background: var(--panel);
            padding-bottom: 10px;
            z-index: 2;
            border-bottom: 2px solid #eee;
            padding-top: 20px;
            margin-right: -20px;
        }

        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .ru-sentence {
            padding: 14px;
            border-radius: 8px;
            background: #f8f9fa;
            border: 2px solid transparent;
            transition: all 0.25s ease;
            line-height: 1.5;
            scroll-margin-top: 12px;
        }
        .ru-sentence.active {
            background: var(--active-bg);
            border-color: var(--active-border);
            box-shadow: 0 2px 8px rgba(33,150,243,0.15);
            font-weight: 500;
            transform: translateX(6px);
        }

        .en-sentence {
            padding: 14px;
            border-radius: 8px;
            background: var(--success-bg);
            border-left: 4px solid var(--success-border);
            animation: fadeIn 0.3s ease;
            line-height: 1.5;
        }
        .placeholder {
            color: var(--text-muted);
            text-align: center;
            margin-top: 40%;
            font-style: italic;
        }

        .input-zone {
            padding: 20px;
            background: #fafbfc;
        }

        #userInput {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            border: 2px solid #e0e4e8;
            border-radius: 8px;
            transition: border-color 0.2s;
            margin-bottom: 12px;
            min-height: 52px;
            max-height: 180px;
            resize: none;
            overflow-y: auto;
            line-height: 1.4;
            font-family: inherit;
        }
        #userInput:focus { outline: none; border-color: var(--accent); }
        input:disabled, textarea:disabled { background: #f1f3f5; color: #a0a5aa; cursor: not-allowed; }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .hidden { display: none !important; }

        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
        }
        .feedback.error { background: var(--error-bg); color: var(--error-text); }
        .feedback.success { background: var(--success-bg); color: #155724; }
        .hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; text-align: center; }
        #enList {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--panel);
            width: 90%; max-width: 700px;
            max-height: 85vh;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h2 { margin: 0; font-size: 1.2rem; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        .text-item, .collection-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border: 1px solid var(--border); border-radius: 8px;
            margin-bottom: 10px; cursor: pointer; transition: background 0.2s;
        }
        .collection-item { cursor: default; }
        .text-item:hover { background: #f8f9fa; }
        .collection-item:hover { background: #f8f9fa; }
        .text-item.active { border-color: var(--accent); background: var(--active-bg); }
        .text-info h3 { margin: 0 0 4px; font-size: 1rem; }
        .text-info p { margin: 0; font-size: 0.85rem; color: var(--text-muted); }
        .text-actions { display: flex; gap: 8px; }
        .manager-nav {
            margin-bottom: 12px;
        }

        textarea {
            width: 100%; height: 150px; padding: 10px;
            border: 2px solid #e0e4e8; border-radius: 8px;
            font-family: inherit; font-size: 0.95rem; resize: vertical;
            margin-bottom: 10px;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        .dual-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
        }
        .input-group input[type="text"] {
            margin-bottom: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
        }
        .name-input-row {
            margin-bottom: 15px;
        }
        .name-input-row label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: 500; }
        .name-input-row input { margin-bottom: 0; }

        .error-msg {
            color: var(--error-text);
            font-size: 0.9rem;
            margin: 10px 0;
            min-height: 1.2em;
        }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #333; color: white; padding: 12px 18px;
            border-radius: 8px; opacity: 0; transform: translateY(10px);
            transition: all 0.3s; z-index: 200;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            body {
                padding: 0;
                height: 100dvh;
            }
            .app-header {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                margin-bottom: 0;
                padding: 12px 14px;
                background: var(--panel);
                border-bottom: 1px solid var(--border);
            }
            .app-header h1 {
                font-size: 1.2rem;
            }
            .header-actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                width: 100%;
            }
            .mode-switch {
                grid-column: 1 / -1;
                justify-content: space-between;
                width: 100%;
            }
            .mode-switch select {
                flex: 1;
                min-width: 0;
            }
            .header-actions .btn {
                width: 100%;
                padding: 10px 12px;
                font-size: 0.9rem;
            }
            .trainer-wrapper {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                margin: 0;
            }
            .panels {
                grid-template-columns: 1fr;
                padding-bottom: 170px;
            }
            .panel {
                max-height: none;
                min-height: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
            .input-zone {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 40;
                background: var(--panel);
                border-top: 1px solid var(--border);
                padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
                transform: translateY(calc(-1 * var(--mobile-keyboard-offset)));
            }
            .modal-content { width: 95%; }
            .dual-input { grid-template-columns: 1fr; }
            #userInput {
                max-height: 140px;
            }
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1>Тренажер перевода</h1>
    <div class="header-actions">
        <button class="btn btn-secondary" id="openVocabulary">Словарный запас: 0</button>
        <button class="btn btn-primary" id="openManager">📚 Выбрать текст</button>
    </div>
</div>

<div class="trainer-wrapper">
    <div class="panels">
        <div class="panel ru-panel">
            <h2>Исходный текст</h2>
            <div class="sentence-list" id="ruList"></div>
        </div>
        <div class="panel en-panel">
            <h2>Ваш перевод</h2>
            <div class="sentence-list" id="enList">
                <div class="placeholder">Переведённые предложения появятся здесь</div>
            </div>
        </div>
    </div>

    <div class="input-zone">
        <textarea id="userInput" rows="1" placeholder="Введите перевод выделенного предложения..." autocomplete="off"></textarea>
        <div class="controls">
            <button id="checkBtn" class="btn btn-primary">Проверить</button>
            <button id="gotItBtn" class="btn btn-warning hidden">Понял</button>
            <button id="restartBtn" class="btn btn-secondary hidden">Начать заново</button>
        </div>
        <div id="feedback" class="feedback hidden"></div>
        <div class="hint">Нажмите Enter для проверки</div>
    </div>
</div>

<!-- Modal Manager -->
<div class="modal-overlay" id="managerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Управление текстами</h2>
            <button class="btn btn-sm btn-secondary" id="closeModal">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="text">Вставка текста</button>
                <button class="tab-btn" data-tab="manage">Управление</button>
            </div>

            <!-- Tab: Text Input -->
            <div id="tab-text" class="tab-content">
                <div class="name-input-row">
                    <label>Название текста (опционально)</label>
                    <input type="text" id="textNameText" placeholder="Например: Новости BBC, Глава 1...">
                </div>
                <div class="dual-input">
                    <div class="input-group">
                        <label>Код языка (опц.)</label>
                        <input type="text" id="srcLang" placeholder="RU" value="RU">
                        <textarea id="srcText" placeholder="Вставьте исходный текст..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>Код языка перевода (опц.)</label>
                        <input type="text" id="trgLang" placeholder="EN" value="EN">
                        <textarea id="trgText" placeholder="Вставьте переведенный текст..."></textarea>
                    </div>
                </div>
                <div id="textError" class="error-msg"></div>
                <button class="btn btn-primary" id="addTextBtnText" style="width:100%">Разобрать и сохранить</button>
            </div>

            <div id="tab-manage" class="tab-content hidden">
                <label class="mode-switch" style="display:flex; margin-bottom: 12px;">
                    <span>Режим:</span>
                    <select id="trainingMode">
                        <option value="easy">Легкий</option>
                        <option value="normal">Нормальный</option>
                        <option value="hard">Сложный</option>
                    </select>
                </label>
                <button class="btn btn-secondary" id="exportJson" style="width:100%; margin-bottom: 10px;">Экспортировать текущую коллекцию (JSON)</button>
                <button class="btn btn-danger" id="clearStorageBtn" style="width:100%">Очистить сохранённые данные (прогресс, словарь)</button>
            </div>

            <!-- List -->
            <h3 style="margin: 25px 0 10px; font-size: 1rem;">Сохраненные тексты</h3>
            <div id="textList"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="vocabularyModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Словарный запас</h2>
            <button class="btn btn-sm btn-secondary" id="closeVocabularyModal">✕</button>
        </div>
        <div class="modal-body">
            <p id="vocabularyCount" style="margin-top: 0; color: var(--text-muted);"></p>
            <div id="vocabularyList"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ==================== УТИЛИТЫ И ХРАНИЛИЩЕ ====================
    const STORAGE_KEYS = {
        PROGRESS: 'trainer_progress',
        ACTIVE_ID: 'trainer_active_id',
        MODE: 'trainer_mode',
        VOCABULARY: 'trainer_vocabulary'
    };

    let fileTexts = [];
    let memoryTexts = [];
    const contentCollectionFiles = new Map();

    function getAllTexts() {
        return [...fileTexts, ...memoryTexts];
    }
    function loadFromStorage(key, fallback) {
        try {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : fallback;
        } catch { return fallback; }
    }

    function saveToStorage(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
    }

    function escapeHtml(str) {
        return String(str ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function ruTextCountLabel(n) {
        const x = Math.abs(Number(n)) || 0;
        const m10 = x % 10;
        const m100 = x % 100;
        if (m100 >= 11 && m100 <= 14) return `${x} текстов`;
        if (m10 === 1) return `${x} текст`;
        if (m10 >= 2 && m10 <= 4) return `${x} текста`;
        return `${x} текстов`;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function hashArray(arr) {
        const str = JSON.stringify(arr.map(s => `${s.ru}|${s.en}`));
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(36);
    }

    function normalizeTextName(name) {
        return String(name || '').trim().toLowerCase();
    }

    function getProgressKey(text) {
        return normalizeTextName(text?.name);
    }

    function migrateProgressToTextNames(textItems, progressMap) {
        const nextProgress = { ...(progressMap || {}) };
        const textById = new Map(textItems.map(text => [text.id, text]));
        let changed = false;

        Object.keys(nextProgress).forEach((key) => {
            if (textById.has(key)) {
                const text = textById.get(key);
                const nameKey = getProgressKey(text);
                if (nameKey && !nextProgress[nameKey]) {
                    nextProgress[nameKey] = nextProgress[key];
                }
                delete nextProgress[key];
                changed = true;
            }
        });

        return { progress: nextProgress, changed };
    }

    function splitIntoSentences(text) {
        if (!text || !text.trim()) return [];
        return text.replace(/([.!?])(["'\u201D\u2019»]*)\s+/g, "$1$2|")
                   .split("\n")
                   .map(line => line.split("|"))
                   .flat()
                   .map(s => s.trim())
                   .filter(s => s.length > 0);
    }

    function slugFromContentFilename(name) {
        const base = String(name || '').replace(/\.json$/i, '').trim();
        const slug = base.replace(/[^a-zA-Z0-9_-]+/g, '_').replace(/^_|_$/g, '');
        return slug || 'file';
    }

    function normalizeChaptersFromEntries(entries, slug, collectionHeading, collectionId) {
        if (!Array.isArray(entries)) return [];
        return entries
            .map((entry, index) => {
                const title = typeof entry?.title === 'string' ? entry.title.trim() : '';
                const sentences = Array.isArray(entry?.sentences)
                    ? entry.sentences.filter(item => typeof item?.ru === 'string' && typeof item?.en === 'string')
                    : [];
                if (!title || !sentences.length) return null;
                const content = sentences.map(sentence => ({ ru: sentence.ru.trim(), en: sentence.en.trim() }))
                    .filter(sentence => sentence.ru && sentence.en);
                if (!content.length) return null;
                return {
                    id: `default_${slug}_${String(index + 1).padStart(3, '0')}`,
                    name: title,
                    content,
                    hash: hashArray(content),
                    collectionHeading,
                    collectionId
                };
            })
            .filter(Boolean);
    }

    async function loadContentTexts() {
        contentCollectionFiles.clear();
        try {
            const manifestRes = await fetch('./content/manifest.json', { cache: 'no-store' });
            if (!manifestRes.ok) return [];
            const manifest = await manifestRes.json();
            if (!Array.isArray(manifest)) return [];
            const all = [];
            for (const file of manifest) {
                if (typeof file !== 'string' || !file.trim().toLowerCase().endsWith('.json')) continue;
                const safeFile = file.replace(/^.*[\\/]/, '');
                const slug = slugFromContentFilename(safeFile);
                const res = await fetch(`./content/${encodeURIComponent(safeFile)}`, { cache: 'no-store' });
                if (!res.ok) continue;
                const data = await res.json();
                let entries;
                let collectionHeading;
                if (Array.isArray(data)) {
                    entries = data;
                    collectionHeading = safeFile.replace(/\.json$/i, '') || slug;
                } else if (data && typeof data === 'object' && Array.isArray(data.items)) {
                    entries = data.items;
                    const h = typeof data.heading === 'string' ? data.heading.trim() : '';
                    collectionHeading = h || safeFile.replace(/\.json$/i, '') || slug;
                } else {
                    continue;
                }
                const collId = `content_${slug}`;
                contentCollectionFiles.set(collId, safeFile);
                all.push(...normalizeChaptersFromEntries(entries, slug, collectionHeading, collId));
            }
            return all;
        } catch {
            return [];
        }
    }

    async function initStorage() {
        try {
            localStorage.removeItem('trainer_texts');
        } catch (_) {}
        fileTexts = await loadContentTexts();
        memoryTexts = [];
        const all = getAllTexts();
        if (all.length && !loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '')) {
            saveToStorage(STORAGE_KEYS.ACTIVE_ID, all[0].id);
        }

        const savedProgress = loadFromStorage(STORAGE_KEYS.PROGRESS, {});
        const migrationResult = migrateProgressToTextNames(all, savedProgress);
        if (migrationResult.changed) {
            saveToStorage(STORAGE_KEYS.PROGRESS, migrationResult.progress);
        }
    }

    // ==================== МЕНЕДЖЕР ТЕКСТОВ ====================
    let activeTextId = '';

    const managerModal = document.getElementById('managerModal');
    const textListEl = document.getElementById('textList');
    let managerCollectionId = null;
    const vocabularyModal = document.getElementById('vocabularyModal');
    const vocabularyCountEl = document.getElementById('vocabularyCount');
    const vocabularyListEl = document.getElementById('vocabularyList');
    const openVocabularyBtn = document.getElementById('openVocabulary');
    const clearStorageBtn = document.getElementById('clearStorageBtn');

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            btn.classList.add('active');
            document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
            document.getElementById('textError').textContent = '';
        });
    });

    document.getElementById('openManager').onclick = () => {
        activeTextId = loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '');
        const groups = buildTextGroups(getAllTexts());
        if (groups.length > 1) {
            const activeText = getAllTexts().find((t) => t.id === activeTextId);
            const cid = activeText ? (activeText.collectionId ?? '__manual__') : null;
            managerCollectionId = cid && groups.some((g) => g.collectionId === cid) ? cid : null;
        } else {
            managerCollectionId = null;
        }
        renderTextList();
        managerModal.classList.add('open');
    };

    document.getElementById('closeModal').onclick = () => managerModal.classList.remove('open');
    document.getElementById('closeVocabularyModal').onclick = () => vocabularyModal.classList.remove('open');

    function getVocabularySet() {
        const words = loadFromStorage(STORAGE_KEYS.VOCABULARY, []);
        if (!Array.isArray(words)) return new Set();
        return new Set(words.filter(word => typeof word === 'string' && word.trim()).map(word => word.trim().toLowerCase()));
    }

    function saveVocabularySet(vocabularySet) {
        saveToStorage(STORAGE_KEYS.VOCABULARY, Array.from(vocabularySet).sort((a, b) => a.localeCompare(b)));
    }

    function extractWords(text) {
        return String(text || '').toLowerCase().match(/\p{L}+/gu) || [];
    }

    function updateVocabularyCount() {
        const vocabularySet = getVocabularySet();
        openVocabularyBtn.textContent = `Словарный запас: ${vocabularySet.size}`;
    }

    function addWordsToVocabulary(text) {
        const words = extractWords(text);
        if (!words.length) return;
        const vocabularySet = getVocabularySet();
        const sizeBefore = vocabularySet.size;
        words.forEach(word => vocabularySet.add(word));
        if (vocabularySet.size !== sizeBefore) {
            saveVocabularySet(vocabularySet);
            updateVocabularyCount();
        }
    }

    function renderVocabularyModal() {
        const words = Array.from(getVocabularySet()).sort((a, b) => a.localeCompare(b));
        vocabularyCountEl.textContent = `Уникальных слов: ${words.length}`;
        if (!words.length) {
            vocabularyListEl.innerHTML = '<p style="color: var(--text-muted); margin: 0;">Пока нет сохраненных слов.</p>';
            return;
        }
        vocabularyListEl.innerHTML = words.map(word => `<div class="en-sentence">${word}</div>`).join('');
    }

    openVocabularyBtn.onclick = () => {
        renderVocabularyModal();
        vocabularyModal.classList.add('open');
    };

    clearStorageBtn.onclick = async () => {
        const confirmed = window.confirm('Удалить сохранённый прогресс, словарь и режим? Добавленные в этой сессии тексты исчезнут; после перезагрузки снова подтянутся файлы из папки content.');
        if (!confirmed) return;

        Object.values(STORAGE_KEYS).forEach((key) => localStorage.removeItem(key));
        try {
            localStorage.removeItem('trainer_texts');
        } catch (_) {}
        await initStorage();
        initTrainer();
        updateVocabularyCount();
        showToast('Данные очищены');
        if (managerModal.classList.contains('open')) {
            activeTextId = loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '');
            managerCollectionId = null;
            renderTextList();
        }
    };

    // --- Text Input ---
    document.getElementById('addTextBtnText').onclick = () => {
        const srcRaw = document.getElementById('srcText').value;
        const trgRaw = document.getElementById('trgText').value;
        const srcLang = document.getElementById('srcLang').value.trim();
        const trgLang = document.getElementById('trgLang').value.trim();
        const customName = document.getElementById('textNameText').value.trim();
        const errEl = document.getElementById('textError');
        errEl.textContent = '';

        if (!srcRaw.trim() || !trgRaw.trim()) {
            errEl.textContent = 'Заполните оба текстовых поля.';
            return;
        }

        const srcSentences = splitIntoSentences(srcRaw);
        const trgSentences = splitIntoSentences(trgRaw);

        if (srcSentences.length !== trgSentences.length) {
            errEl.textContent = `Несоответствие: Оригинал (${srcSentences.length}) ≠ Перевод (${trgSentences.length}). Проверьте пунктуацию.`;
            return;
        }

        const allTexts = getAllTexts();
        const activeIdForCollection = loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '');
        const activeForCollection = allTexts.find((t) => t.id === activeIdForCollection);

        const content = srcSentences.map((ru, i) => ({ ru, en: trgSentences[i] }));
        const hash = hashArray(content);
        const newName = (customName || `${srcLang || 'A'} -> ${trgLang || 'B'} (${content.length} предложений)`).trim();
        const newNameKey = normalizeTextName(newName);
        
        if (allTexts.some(t => t.hash === hash)) {
            errEl.textContent = 'Такой текст уже сохранен.';
            return;
        }
        if (allTexts.some(t => normalizeTextName(t.name) === newNameKey)) {
            errEl.textContent = 'Текст с таким названием уже существует.';
            return;
        }

        const newText = {
            id: 'txt_' + Date.now().toString(36),
            name: newName,
            content,
            hash
        };
        if (activeForCollection && activeForCollection.collectionId) {
            newText.collectionId = activeForCollection.collectionId;
            newText.collectionHeading = activeForCollection.collectionHeading || activeForCollection.collectionId;
        }

        memoryTexts.push(newText);
        
        document.getElementById('srcText').value = '';
        document.getElementById('trgText').value = '';
        document.getElementById('textNameText').value = '';
        
        renderTextList();
        showToast('Текст успешно добавлен');
    };

    function textToExportItem(text) {
        return {
            title: text.name,
            sentences: (text.content || []).map((sentence) => ({
                ru: sentence.ru,
                en: sentence.en
            }))
        };
    }

    function rawEntriesToExportItems(entries) {
        if (!Array.isArray(entries)) return [];
        return entries
            .map((entry) => {
                const title = typeof entry?.title === 'string' ? entry.title.trim() : '';
                const sentences = Array.isArray(entry?.sentences)
                    ? entry.sentences
                        .filter((item) => typeof item?.ru === 'string' && typeof item?.en === 'string')
                        .map((item) => ({ ru: item.ru.trim(), en: item.en.trim() }))
                        .filter((s) => s.ru && s.en)
                    : [];
                if (!title || !sentences.length) return null;
                return { title, sentences };
            })
            .filter(Boolean);
    }

    async function loadRawCollectionFileForExport(collectionId) {
        const file = contentCollectionFiles.get(collectionId);
        if (!file) return { heading: '', items: [] };
        try {
            const res = await fetch(`./content/${encodeURIComponent(file)}`, { cache: 'no-store' });
            if (!res.ok) return { heading: '', items: [] };
            const data = await res.json();
            if (Array.isArray(data)) {
                return {
                    heading: file.replace(/\.json$/i, '') || '',
                    items: rawEntriesToExportItems(data)
                };
            }
            if (data && typeof data === 'object' && Array.isArray(data.items)) {
                const h = typeof data.heading === 'string' ? data.heading.trim() : '';
                return {
                    heading: h || file.replace(/\.json$/i, '') || '',
                    items: rawEntriesToExportItems(data.items)
                };
            }
        } catch (_) {}
        return { heading: '', items: [] };
    }

    document.getElementById('exportJson').onclick = async () => {
        try {
            const allTexts = getAllTexts();
            const activeId = loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '');
            const activeText = allTexts.find((t) => t.id === activeId) || allTexts[0];
            if (!activeText) {
                showToast('Нет текстов для экспорта');
                return;
            }
            const collKey = activeText.collectionId ?? '__manual__';
            const inCollection = allTexts.filter((t) => (t.collectionId ?? '__manual__') === collKey);
            if (!inCollection.length) {
                showToast('Нет текстов для экспорта');
                return;
            }

            let heading;
            let items;
            if (collKey.startsWith('content_')) {
                const raw = await loadRawCollectionFileForExport(collKey);
                heading = raw.heading || activeText.collectionHeading || collKey;
                const memoryItems = memoryTexts
                    .filter((t) => (t.collectionId ?? '__manual__') === collKey)
                    .map(textToExportItem);
                items = [...raw.items, ...memoryItems];
            } else {
                heading = collKey === '__manual__'
                    ? 'Добавлено вручную'
                    : (activeText.collectionHeading || activeText.collectionId || 'Экспорт');
                items = inCollection.map(textToExportItem);
            }

            const exportData = { heading, items };
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const now = new Date();
            const datePart = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            link.href = url;
            link.download = `trainer-collection-${datePart}.json`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
            showToast('Экспорт завершен');
        } catch (_) {
            showToast('Ошибка экспорта');
        }
    };

    function buildTextGroups(textsList) {
        const orderFirst = new Map();
        textsList.forEach((t, i) => {
            const cid = t.collectionId ?? '__manual__';
            if (!orderFirst.has(cid)) orderFirst.set(cid, i);
        });
        const byId = new Map();
        for (const t of textsList) {
            const cid = t.collectionId ?? '__manual__';
            if (!byId.has(cid)) {
                byId.set(cid, {
                    collectionId: cid,
                    collectionHeading: t.collectionHeading || '',
                    texts: []
                });
            }
            byId.get(cid).texts.push(t);
        }
        return Array.from(byId.values()).sort((a, b) =>
            (orderFirst.get(a.collectionId) ?? 0) - (orderFirst.get(b.collectionId) ?? 0)
        );
    }

    function collectionLabel(group) {
        if (group.collectionId === '__manual__') return 'Добавлено вручную';
        return group.collectionHeading || 'Без названия';
    }

    function renderTextList() {
        const texts = getAllTexts();
        const migrationResult = migrateProgressToTextNames(texts, loadFromStorage(STORAGE_KEYS.PROGRESS, {}));
        const progress = migrationResult.progress;
        if (migrationResult.changed) {
            saveToStorage(STORAGE_KEYS.PROGRESS, progress);
        }
        textListEl.innerHTML = '';
        if (texts.length === 0) {
            textListEl.innerHTML = '<p style="text-align:center; color:var(--text-muted)">Нет текстов (проверьте manifest и папку content)</p>';
            return;
        }

        const groups = buildTextGroups(texts);
        const multiCollection = groups.length > 1;

        if (multiCollection && managerCollectionId === null) {
            groups.forEach((g, index) => {
                const label = collectionLabel(g);
                const div = document.createElement('div');
                div.className = 'collection-item';
                div.innerHTML = `
                    <div class="text-info">
                        <h3>${index + 1}. ${escapeHtml(label)}</h3>
                        <p>${ruTextCountLabel(g.texts.length)}</p>
                    </div>
                    <div class="text-actions">
                        <button type="button" class="btn btn-sm btn-primary open-collection-btn" data-collection-id="${g.collectionId}">Открыть</button>
                    </div>
                `;
                textListEl.appendChild(div);
            });
            textListEl.querySelectorAll('.open-collection-btn').forEach((btn) => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    managerCollectionId = btn.getAttribute('data-collection-id');
                    renderTextList();
                };
            });
            return;
        }

        let activeGroup;
        if (!multiCollection) {
            activeGroup = groups[0];
        } else {
            activeGroup = groups.find((g) => g.collectionId === managerCollectionId);
            if (!activeGroup) {
                managerCollectionId = null;
                renderTextList();
                return;
            }
        }

        if (multiCollection) {
            const nav = document.createElement('div');
            nav.className = 'manager-nav';
            const backBtn = document.createElement('button');
            backBtn.type = 'button';
            backBtn.className = 'btn btn-sm btn-secondary';
            backBtn.id = 'managerBackBtn';
            backBtn.textContent = '← Коллекции';
            backBtn.onclick = () => {
                managerCollectionId = null;
                renderTextList();
            };
            nav.appendChild(backBtn);
            textListEl.appendChild(nav);
        }

        activeGroup.texts.forEach((t, index) => {
            const total = t.content.length;
            const current = Math.min(progress[getProgressKey(t)]?.currentIndex ?? 0, total);
            const percent = total > 0 ? Math.round((current / total) * 100) : 0;
            const div = document.createElement('div');
            div.className = `text-item ${t.id === activeTextId ? 'active' : ''}`;
            div.innerHTML = `
                <div class="text-info">
                    <h3>${index + 1}. ${escapeHtml(t.name)}</h3>
                    <p>${total} предложений • Прогресс: ${current}/${total} (${percent}%)</p>
                </div>
                <div class="text-actions">
                    <button type="button" class="btn btn-sm btn-primary load-text-btn" data-id="${t.id}">Загрузить</button>
                    ${!t.id.startsWith('default_') ? `<button type="button" class="btn btn-sm btn-danger delete-text-btn" data-id="${t.id}">Удалить</button>` : ''}
                </div>
            `;
            textListEl.appendChild(div);
        });

        textListEl.querySelectorAll('.load-text-btn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); selectText(btn.dataset.id); };
        });
        textListEl.querySelectorAll('.delete-text-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                if (confirm('Удалить этот текст? Прогресс будет потерян.')) deleteText(btn.dataset.id);
            };
        });
    }

    function selectText(id) {
        saveToStorage(STORAGE_KEYS.ACTIVE_ID, id);
        activeTextId = id;
        initTrainer();
        managerModal.classList.remove('open');
        showToast('Текст загружен');
    }

    function deleteText(id) {
        if (String(id).startsWith('default_')) return;
        const removedText = memoryTexts.find(t => t.id === id);
        if (!removedText) return;
        memoryTexts = memoryTexts.filter(t => t.id !== id);
        const progress = loadFromStorage(STORAGE_KEYS.PROGRESS, {});
        delete progress[getProgressKey(removedText)];
        saveToStorage(STORAGE_KEYS.PROGRESS, progress);
        
        if (activeTextId === id) {
            const rest = getAllTexts();
            if (rest.length > 0) {
                selectText(rest[0].id);
            } else {
                saveToStorage(STORAGE_KEYS.ACTIVE_ID, '');
                activeTextId = '';
                initTrainer();
            }
        }
        renderTextList();
    }

    // ==================== ЛОГИКА ТРЕНАЖЕРА ====================
    let currentContent = [];
    let currentIndex = 0;
    let furthestIndexReached = 0;
    let isWaitingForGotIt = false;
    let isFinished = false;
    let trainingMode = loadFromStorage(STORAGE_KEYS.MODE, 'normal');

    const ruList = document.getElementById('ruList');
    const enList = document.getElementById('enList');
    const userInput = document.getElementById('userInput');
    const checkBtn = document.getElementById('checkBtn');
    const gotItBtn = document.getElementById('gotItBtn');
    const restartBtn = document.getElementById('restartBtn');
    const feedback = document.getElementById('feedback');
    const trainingModeEl = document.getElementById('trainingMode');
    const isMobile = window.matchMedia('(max-width: 768px)');

    function resolveTrainingMode(mode) {
        if (mode === 'hard') return 'hard';
        if (mode === 'easy' || mode === 'legion') return 'easy';
        return 'normal';
    }

    function normalize(str) {
        return str
            .toLowerCase()
            .replace(/[^\p{L}]+/gu, '');
    }

    function resizeUserInput() {
        userInput.style.height = 'auto';
        const nextHeight = Math.min(userInput.scrollHeight, isMobile.matches ? 140 : 180);
        userInput.style.height = `${Math.max(nextHeight, 52)}px`;
    }

    function syncMobileKeyboardOffset() {
        if (!isMobile.matches) {
            document.documentElement.style.setProperty('--mobile-keyboard-offset', '0px');
            return;
        }
        const viewport = window.visualViewport;
        if (!viewport) {
            document.documentElement.style.setProperty('--mobile-keyboard-offset', '0px');
            return;
        }
        const keyboardOffset = Math.max(0, window.innerHeight - viewport.height - viewport.offsetTop);
        document.documentElement.style.setProperty('--mobile-keyboard-offset', `${keyboardOffset}px`);
    }

    function scrollToActiveSentenceOnMobileKeyboard() {
        if (!isMobile.matches) return;
        const activeSentence = document.querySelector('.ru-sentence.active');
        if (!activeSentence) return;
        const activeIndex = Number(activeSentence.dataset.index);
        const targetIndex = Number.isNaN(activeIndex) ? 0 : Math.max(0, activeIndex - 1);
        const targetSentence = document.querySelector(`.ru-sentence[data-index="${targetIndex}"]`) || activeSentence;
        targetSentence.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function initTrainer() {
        const texts = getAllTexts();
        activeTextId = loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '');
        const activeText = texts.find(t => t.id === activeTextId) || texts[0];
        
        if (!activeText) {
            alert('Ошибка: нет текстов. Добавьте файлы в content/manifest или вставьте текст.');
            return;
        }

        currentContent = activeText.content;
        const migrationResult = migrateProgressToTextNames(texts, loadFromStorage(STORAGE_KEYS.PROGRESS, {}));
        const savedProgress = migrationResult.progress;
        if (migrationResult.changed) {
            saveToStorage(STORAGE_KEYS.PROGRESS, savedProgress);
        }
        const progressEntry = savedProgress[getProgressKey(activeText)] || {};
        currentIndex = progressEntry.currentIndex ?? 0;
        
        if (currentIndex >= currentContent.length) currentIndex = 0;
        if (currentContent.length === 0) {
            furthestIndexReached = 0;
        } else {
            const savedFurthest = Number.isInteger(progressEntry.furthestIndex) ? progressEntry.furthestIndex : currentIndex;
            furthestIndexReached = Math.max(currentIndex, Math.min(savedFurthest, currentContent.length - 1));
        }
        
        isFinished = false;
        isWaitingForGotIt = false;
        
        renderRU();
        renderEN();
        updateHighlight();
        
        userInput.style.display = 'block';
        userInput.disabled = false;
        userInput.value = '';
        resizeUserInput();
        feedback.className = 'feedback hidden';
        checkBtn.classList.remove('hidden');
        gotItBtn.classList.add('hidden');
        restartBtn.classList.remove('hidden');
    }

    function renderRU() {
        ruList.innerHTML = '';
        const visibleCount = Math.min(currentContent.length, Math.max(1, furthestIndexReached + 1));
        currentContent.slice(0, visibleCount).forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'ru-sentence';
            div.textContent = s.ru;
            div.dataset.index = i;
            ruList.appendChild(div);
        });
    }

    function renderEN() {
        enList.innerHTML = '';
        if (currentIndex === 0) {
            enList.innerHTML = '<div class="placeholder">Переведённые предложения появятся здесь</div>';
            return;
        }
        currentContent.slice(0, currentIndex).forEach(s => {
            const div = document.createElement('div');
            div.className = 'en-sentence';
            div.textContent = s.en;
            enList.appendChild(div);
        });
        enList.scrollTop = enList.scrollHeight;
    }

    function updateHighlight() {
        document.querySelectorAll('.ru-sentence').forEach(el => {
            el.classList.toggle('active', parseInt(el.dataset.index) === currentIndex);
        });
        const active = document.querySelector('.ru-sentence.active');
        if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function saveProgress() {
        const activeText = getAllTexts().find(t => t.id === activeTextId);
        if (!activeText) return;
        const prog = loadFromStorage(STORAGE_KEYS.PROGRESS, {});
        prog[getProgressKey(activeText)] = { currentIndex, furthestIndex: furthestIndexReached };
        saveToStorage(STORAGE_KEYS.PROGRESS, prog);
    }

    function checkAnswer() {
        if (isFinished || isWaitingForGotIt || !userInput.value.trim()) return;

        const userVal = normalize(userInput.value);
        const targetVal = normalize(currentContent[currentIndex].en);
        feedback.classList.add('hidden');

        if (userVal === targetVal) {
            addWordsToVocabulary(userInput.value);
            currentIndex++;
            if (currentContent.length > 0 && currentIndex < currentContent.length) {
                furthestIndexReached = Math.max(furthestIndexReached, currentIndex);
                renderRU();
            }
            saveProgress();
            renderEN();
            if (currentIndex >= currentContent.length) {
                finishTrainer();
            } else {
                userInput.value = '';
                resizeUserInput();
                updateHighlight();
            }
        } else {
            isWaitingForGotIt = true;
            userInput.disabled = true;
            checkBtn.classList.add('hidden');
            gotItBtn.classList.remove('hidden');
            feedback.className = 'feedback error';
            feedback.innerHTML = `❌ Ошибка. Правильно:<br><strong>${currentContent[currentIndex].en}</strong>`;
        }
    }

    function handleGotIt() {
        if (trainingMode === 'hard') {
            currentIndex = 0;
        } else if (trainingMode !== 'easy') {
            currentIndex = Math.max(0, currentIndex - 1);
        }
        saveProgress();
        
        isWaitingForGotIt = false;
        userInput.disabled = false;
        gotItBtn.classList.add('hidden');
        checkBtn.classList.remove('hidden');
        feedback.classList.add('hidden');
        
        renderEN(); // Перерисовка справа (удаляет верхнее)
        userInput.value = '';
        resizeUserInput();
        updateHighlight();
        userInput.focus();
    }

    function finishTrainer() {
        isFinished = true;
        userInput.style.display = 'none';
        checkBtn.classList.add('hidden');
        document.querySelectorAll('.ru-sentence').forEach(el => el.classList.remove('active'));
        feedback.className = 'feedback success';
        feedback.textContent = '🎉 Поздравляем! Весь текст успешно переведен.';
    }

    document.getElementById('restartBtn').onclick = () => {
        if (confirm('Сбросить прогресс по этому тексту?')) {
            currentIndex = 0;
            furthestIndexReached = 0;
            saveProgress();
            initTrainer();
        }
    };

    checkBtn.addEventListener('click', checkAnswer);
    gotItBtn.addEventListener('click', handleGotIt);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            checkAnswer();
        }
    });
    userInput.addEventListener('input', resizeUserInput);
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', syncMobileKeyboardOffset);
        window.visualViewport.addEventListener('scroll', syncMobileKeyboardOffset);
    }
    trainingMode = resolveTrainingMode(trainingMode);
    trainingModeEl.value = trainingMode;
    trainingModeEl.addEventListener('change', () => {
        trainingMode = resolveTrainingMode(trainingModeEl.value);
        saveToStorage(STORAGE_KEYS.MODE, trainingMode);
    });
    window.addEventListener('resize', syncMobileKeyboardOffset);
    userInput.addEventListener('focus', () => {
        syncMobileKeyboardOffset();
        setTimeout(scrollToActiveSentenceOnMobileKeyboard, 80);
        setTimeout(scrollToActiveSentenceOnMobileKeyboard, 260);
    });
    userInput.addEventListener('blur', () => {
        setTimeout(syncMobileKeyboardOffset, 120);
    });

    // Init
    async function bootstrap() {
        await initStorage();
        updateVocabularyCount();
        initTrainer();
        syncMobileKeyboardOffset();
        resizeUserInput();
    }

    bootstrap();
</script>

</body>
</html>
