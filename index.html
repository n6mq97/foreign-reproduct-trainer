<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер перевода</title>
    <style>
        :root {
            --bg: #f4f6f9;
            --panel: #ffffff;
            --accent: #4a90d9;
            --accent-hover: #357abd;
            --active-bg: #e3f2fd;
            --active-border: #2196f3;
            --success-bg: #e8f5e9;
            --success-border: #4caf50;
            --error-bg: #ffebee;
            --error-text: #c62828;
            --text: #2c3e50;
            --text-muted: #7f8c8d;
            --border: #eaecef;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 12px;
            --app-height: 100vh;
            --keyboard-offset: 0px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            height: var(--app-height);
            display: flex;
            flex-direction: column;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .app-header h1 { margin: 0; font-size: 1.4rem; }

        .btn {
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #f57c00; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }

        .trainer-wrapper {
            flex: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            flex: 1;
            min-height: 0;
            border-bottom: 1px solid var(--border);
        }

        .panel {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .panel h2 {
            margin: 0 0 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            background: var(--panel);
            padding-bottom: 10px;
            z-index: 2;
            border-bottom: 2px solid #eee;
        }

        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ru-sentence {
            padding: 14px;
            border-radius: 8px;
            background: #f8f9fa;
            border: 2px solid transparent;
            transition: all 0.25s ease;
            line-height: 1.5;
        }
        .ru-sentence.active {
            background: var(--active-bg);
            border-color: var(--active-border);
            box-shadow: 0 2px 8px rgba(33,150,243,0.15);
            font-weight: 500;
            transform: translateX(6px);
        }

        .en-sentence {
            padding: 14px;
            border-radius: 8px;
            background: var(--success-bg);
            border-left: 4px solid var(--success-border);
            animation: fadeIn 0.3s ease;
            line-height: 1.5;
        }
        .placeholder {
            color: var(--text-muted);
            text-align: center;
            margin-top: 40%;
            font-style: italic;
        }

        .input-zone {
            padding: 20px;
            background: #fafbfc;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            border: 2px solid #e0e4e8;
            border-radius: 8px;
            transition: border-color 0.2s;
            margin-bottom: 12px;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent); }
        input:disabled { background: #f1f3f5; color: #a0a5aa; cursor: not-allowed; }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .hidden { display: none !important; }

        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
        }
        .feedback.error { background: var(--error-bg); color: var(--error-text); }
        .feedback.success { background: var(--success-bg); color: #155724; }
        .hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--panel);
            width: 90%; max-width: 700px;
            max-height: 85vh;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h2 { margin: 0; font-size: 1.2rem; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        .text-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border: 1px solid var(--border); border-radius: 8px;
            margin-bottom: 10px; cursor: pointer; transition: background 0.2s;
        }
        .text-item:hover { background: #f8f9fa; }
        .text-item.active { border-color: var(--accent); background: var(--active-bg); }
        .text-info h3 { margin: 0 0 4px; font-size: 1rem; }
        .text-info p { margin: 0; font-size: 0.85rem; color: var(--text-muted); }
        .text-actions { display: flex; gap: 8px; }

        textarea {
            width: 100%; height: 150px; padding: 10px;
            border: 2px solid #e0e4e8; border-radius: 8px;
            font-family: inherit; font-size: 0.95rem; resize: vertical;
            margin-bottom: 10px;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        .dual-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
        }
        .input-group input[type="text"] {
            margin-bottom: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
        }
        .name-input-row {
            margin-bottom: 15px;
        }
        .name-input-row label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: 500; }
        .name-input-row input { margin-bottom: 0; }

        .error-msg {
            color: var(--error-text);
            font-size: 0.9rem;
            margin: 10px 0;
            min-height: 1.2em;
        }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #333; color: white; padding: 12px 18px;
            border-radius: 8px; opacity: 0; transform: translateY(10px);
            transition: all 0.3s; z-index: 200;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            body {
                padding: 10px;
                overflow: hidden;
            }
            .app-header {
                margin-bottom: 10px;
                flex-shrink: 0;
            }
            .trainer-wrapper {
                height: 100%;
                min-height: 0;
            }
            .panels {
                grid-template-columns: 1fr;
                flex: 1;
                min-height: 0;
                overflow: hidden;
            }
            .panel {
                padding: 12px;
                min-height: 0;
            }
            .ru-panel {
                flex: 0 0 auto;
                max-height: 36vh;
                border-bottom: 1px solid var(--border);
            }
            .en-panel {
                flex: 1;
                min-height: 0;
            }
            .input-zone {
                position: sticky;
                bottom: var(--keyboard-offset);
                z-index: 20;
                padding: 12px;
                border-top: 1px solid var(--border);
            }
            input[type="text"] {
                margin-bottom: 10px;
                padding: 12px;
                font-size: 1rem;
            }
            .controls {
                gap: 8px;
            }
            .modal-content { width: 95%; }
            .dual-input { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1>Тренажер перевода</h1>
    <button class="btn btn-primary" id="openManager">📚 Выбрать текст</button>
</div>

<div class="trainer-wrapper">
    <div class="panels">
        <div class="panel ru-panel">
            <h2>Исходный текст</h2>
            <div class="sentence-list" id="ruList"></div>
        </div>
        <div class="panel en-panel">
            <h2>Ваш перевод</h2>
            <div class="sentence-list" id="enList">
                <div class="placeholder">Переведённые предложения появятся здесь</div>
            </div>
        </div>
    </div>

    <div class="input-zone">
        <input type="text" id="userInput" placeholder="Введите перевод выделенного предложения..." autocomplete="off">
        <div class="controls">
            <button id="checkBtn" class="btn btn-primary">Проверить</button>
            <button id="gotItBtn" class="btn btn-warning hidden">Понял</button>
            <button id="restartBtn" class="btn btn-secondary hidden">Начать заново</button>
        </div>
        <div id="feedback" class="feedback hidden"></div>
        <div class="hint">Нажмите Enter для проверки</div>
    </div>
</div>

<!-- Modal Manager -->
<div class="modal-overlay" id="managerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Управление текстами</h2>
            <button class="btn btn-sm btn-secondary" id="closeModal">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="text">Вставка текста</button>
                <button class="tab-btn" data-tab="json">JSON импорт</button>
            </div>

            <!-- Tab: Text Input -->
            <div id="tab-text" class="tab-content">
                <div class="name-input-row">
                    <label>Название текста (опционально)</label>
                    <input type="text" id="textNameText" placeholder="Например: Новости BBC, Глава 1...">
                </div>
                <div class="dual-input">
                    <div class="input-group">
                        <label>Код языка (опц.)</label>
                        <input type="text" id="srcLang" placeholder="RU" value="RU">
                        <textarea id="srcText" placeholder="Вставьте исходный текст..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>Код языка перевода (опц.)</label>
                        <input type="text" id="trgLang" placeholder="EN" value="EN">
                        <textarea id="trgText" placeholder="Вставьте переведенный текст..."></textarea>
                    </div>
                </div>
                <div id="textError" class="error-msg"></div>
                <button class="btn btn-primary" id="addTextBtnText" style="width:100%">Разобрать и сохранить</button>
            </div>

            <!-- Tab: JSON Input -->
            <div id="tab-json" class="tab-content hidden">
                <div class="name-input-row">
                    <label>Название текста (опционально)</label>
                    <input type="text" id="textNameJson" placeholder="Например: Тестовые фразы">
                </div>
                <p style="margin-top:0; color: var(--text-muted); font-size: 0.9rem;">Вставьте JSON массив:</p>
                <textarea id="jsonInput" placeholder='[
  { "ru": "Привет.", "en": "Hi." },
  { "ru": "Как дела?", "en": "How are you?" }
]'></textarea>
                <div id="jsonError" class="error-msg"></div>
                <button class="btn btn-primary" id="saveJson" style="width:100%">Сохранить JSON</button>
            </div>

            <!-- List -->
            <h3 style="margin: 25px 0 10px; font-size: 1rem;">Сохраненные тексты</h3>
            <div id="textList"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ==================== УТИЛИТЫ И ХРАНИЛИЩЕ ====================
    const STORAGE_KEYS = {
        TEXTS: 'trainer_texts',
        PROGRESS: 'trainer_progress',
        ACTIVE_ID: 'trainer_active_id'
    };

    function loadFromStorage(key, fallback) {
        try {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : fallback;
        } catch { return fallback; }
    }

    function saveToStorage(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function hashArray(arr) {
        const str = JSON.stringify(arr.map(s => `${s.ru}|${s.en}`));
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(36);
    }

    // Надёжное разбиение текста на предложения
    function splitIntoSentences(text) {
        if (!text || !text.trim()) return [];
        // Заменяем точку/воскл/вопрос+пробел на разделитель, затем бьём по строкам и разделителям
        return text.replace(/([.!?])\s+/g, "$1|")
                   .split("\n")
                   .map(line => line.split("|"))
                   .flat()
                   .map(s => s.trim())
                   .filter(s => s.length > 0);
    }

    // ==================== ДАННЫЕ ПО УМОЛЧАНИЮ ====================
    const DEFAULT_TEXT = {
        id: 'default_001',
        name: 'Основы (RU -> EN)',
        content: [
            { ru: "Сегодня отличная погода для прогулки в парке.", en: "Today is excellent weather for a walk in the park." },
            { ru: "Я обычно пью кофе утром, а чай вечером.", en: "I usually drink coffee in the morning and tea in the evening." },
            { ru: "Эта книга лежит на столе возле окна.", en: "This book is on the table near the window." },
            { ru: "Мы планируем поездку в горы на следующие выходные.", en: "We are planning a trip to the mountains for next weekend." },
            { ru: "Не забудь позвонить мне, как только вернешься домой.", en: "Don't forget to call me as soon as you get home." }
        ]
    };

    function initStorage() {
        let texts = loadFromStorage(STORAGE_KEYS.TEXTS, []);
        if (!texts.length) {
            texts.push({ ...DEFAULT_TEXT, hash: hashArray(DEFAULT_TEXT.content) });
            saveToStorage(STORAGE_KEYS.TEXTS, texts);
        }
        if (!loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '')) {
            saveToStorage(STORAGE_KEYS.ACTIVE_ID, texts[0].id);
        }
    }

    // ==================== МЕНЕДЖЕР ТЕКСТОВ ====================
    let texts = [];
    let activeTextId = '';

    const managerModal = document.getElementById('managerModal');
    const textListEl = document.getElementById('textList');

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            btn.classList.add('active');
            document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
            document.getElementById('textError').textContent = '';
            document.getElementById('jsonError').textContent = '';
        });
    });

    document.getElementById('openManager').onclick = () => {
        texts = loadFromStorage(STORAGE_KEYS.TEXTS, []);
        activeTextId = loadFromStorage(STORAGE_KEYS.ACTIVE_ID, '');
        renderTextList();
        managerModal.classList.add('open');
    };

    document.getElementById('closeModal').onclick = () => managerModal.classList.remove('open');

    // --- Text Input ---
    document.getElementById('addTextBtnText').onclick = () => {
        const srcRaw = document.getElementById('srcText').value;
        const trgRaw = document.getElementById('trgText').value;
        const srcLang = document.getElementById('srcLang').value.trim();
        const trgLang = document.getElementById('trgLang').value.trim();
        const customName = document.getElementById('textNameText').value.trim();
        const errEl = document.getElementById('textError');
        errEl.textContent = '';

        if (!srcRaw.trim() || !trgRaw.trim()) {
            errEl.textContent = 'Заполните оба текстовых поля.';
            return;
        }

        const srcSentences = splitIntoSentences(srcRaw);
        const trgSentences = splitIntoSentences(trgRaw);

        if (srcSentences.length !== trgSentences.length) {
            errEl.textContent = `Несоответствие: Оригинал (${srcSentences.length}) ≠ Перевод (${trgSentences.length}). Проверьте пунктуацию.`;
            return;
        }

        const content = srcSentences.map((ru, i) => ({ ru, en: trgSentences[i] }));
        const hash = hashArray(content);
        
        if (texts.some(t => t.hash === hash)) {
            errEl.textContent = 'Такой текст уже сохранен.';
            return;
        }

        const autoName = `${srcLang || 'A'} -> ${trgLang || 'B'} (${content.length} предложений)`;
        const newText = {
            id: 'txt_' + Date.now().toString(36),
            name: customName || autoName,
            content,
            hash
        };

        texts.push(newText);
        saveToStorage(STORAGE_KEYS.TEXTS, texts);
        
        document.getElementById('srcText').value = '';
        document.getElementById('trgText').value = '';
        document.getElementById('textNameText').value = '';
        
        renderTextList();
        showToast('Текст успешно добавлен');
    };

    // --- JSON Input ---
    document.getElementById('saveJson').onclick = () => {
        const errEl = document.getElementById('jsonError');
        errEl.textContent = '';
        const customName = document.getElementById('textNameJson').value.trim();
        
        try {
            const data = JSON.parse(document.getElementById('jsonInput').value);
            if (!Array.isArray(data)) throw new Error('JSON должен быть массивом []');
            if (data.length === 0) throw new Error('Массив не должен быть пустым');
            
            data.forEach((item, i) => {
                if (!item.ru || !item.en || typeof item.ru !== 'string' || typeof item.en !== 'string') {
                    throw new Error(`Элемент ${i+1} должен содержать строки "ru" и "en"`);
                }
            });

            const hash = hashArray(data);
            if (texts.some(t => t.hash === hash)) {
                throw new Error('Такой текст уже сохранен.');
            }

            const newText = {
                id: 'txt_' + Date.now().toString(36),
                name: customName || `JSON Import (${data.length} предложений)`,
                content: data,
                hash
            };

            texts.push(newText);
            saveToStorage(STORAGE_KEYS.TEXTS, texts);
            document.getElementById('jsonInput').value = '';
            document.getElementById('textNameJson').value = '';
            renderTextList();
            showToast('JSON успешно импортирован');
        } catch (err) {
            errEl.textContent = '❌ ' + err.message;
        }
    };

    function renderTextList() {
        // Всегда берем свежие данные
        texts = loadFromStorage(STORAGE_KEYS.TEXTS, []);
        textListEl.innerHTML = '';
        if (texts.length === 0) {
            textListEl.innerHTML = '<p style="text-align:center; color:var(--text-muted)">Нет сохранённых текстов</p>';
            return;
        }
        texts.forEach(t => {
            const div = document.createElement('div');
            div.className = `text-item ${t.id === activeTextId ? 'active' : ''}`;
            div.innerHTML = `
                <div class="text-info">
                    <h3>${t.name}</h3>
                    <p>${t.content.length} предложений</p>
                </div>
                <div class="text-actions">
                    <button class="btn btn-sm btn-primary load-text-btn" data-id="${t.id}">Загрузить</button>
                    ${t.id !== 'default_001' ? `<button class="btn btn-sm btn-danger delete-text-btn" data-id="${t.id}">Удалить</button>` : ''}
                </div>
            `;
            textListEl.appendChild(div);
        });

        textListEl.querySelectorAll('.load-text-btn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); selectText(btn.dataset.id); };
        });
        textListEl.querySelectorAll('.delete-text-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                if (confirm('Удалить этот текст? Прогресс будет потерян.')) deleteText(btn.dataset.id);
            };
        });
    }

    function selectText(id) {
        saveToStorage(STORAGE_KEYS.ACTIVE_ID, id);
        activeTextId = id;
        initTrainer();
        managerModal.classList.remove('open');
        showToast('Текст загружен');
    }

    function deleteText(id) {
        texts = texts.filter(t => t.id !== id);
        saveToStorage(STORAGE_KEYS.TEXTS, texts);
        const progress = loadFromStorage(STORAGE_KEYS.PROGRESS, {});
        delete progress[id];
        saveToStorage(STORAGE_KEYS.PROGRESS, progress);
        
        if (activeTextId === id) {
            const fallback = texts.length > 0 ? texts[0].id : 'default_001';
            selectText(fallback);
        }
        renderTextList();
    }

    // ==================== ЛОГИКА ТРЕНАЖЕРА ====================
    let currentContent = [];
    let currentIndex = 0;
    let isWaitingForGotIt = false;
    let isFinished = false;

    const ruList = document.getElementById('ruList');
    const enList = document.getElementById('enList');
    const userInput = document.getElementById('userInput');
    const checkBtn = document.getElementById('checkBtn');
    const gotItBtn = document.getElementById('gotItBtn');
    const restartBtn = document.getElementById('restartBtn');
    const feedback = document.getElementById('feedback');
    const mobileQuery = window.matchMedia('(max-width: 768px)');

    function syncViewportHeight() {
        const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${Math.round(viewportHeight)}px`);
    }

    function syncKeyboardOffset() {
        if (!mobileQuery.matches || !window.visualViewport) {
            document.documentElement.style.setProperty('--keyboard-offset', '0px');
            return;
        }
        const keyboardOffset = Math.max(0, window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop);
        document.documentElement.style.setProperty('--keyboard-offset', `${Math.round(keyboardOffset)}px`);
    }

    function keepActiveSentenceVisible() {
        if (!mobileQuery.matches) return;
        const active = document.querySelector('.ru-sentence.active');
        if (active) active.scrollIntoView({ behavior: 'auto', block: 'nearest' });
    }

    function normalize(str) {
        return str.trim().toLowerCase().replace(/[^\w\s']/g, '').replace(/\s+/g, ' ');
    }

    function initTrainer() {
        texts = loadFromStorage(STORAGE_KEYS.TEXTS, []);
        activeTextId = loadFromStorage(STORAGE_KEYS.ACTIVE_ID, 'default_001');
        const activeText = texts.find(t => t.id === activeTextId) || texts[0];
        
        if (!activeText) {
            alert('Ошибка: текст не найден. Попробуйте добавить новый.');
            return;
        }

        currentContent = activeText.content;
        const savedProgress = loadFromStorage(STORAGE_KEYS.PROGRESS, {});
        currentIndex = savedProgress[activeTextId]?.currentIndex ?? 0;
        
        if (currentIndex >= currentContent.length) currentIndex = 0;
        
        isFinished = false;
        isWaitingForGotIt = false;
        
        renderRU();
        renderEN();
        updateHighlight();
        
        userInput.style.display = 'block';
        userInput.disabled = false;
        userInput.value = '';
        feedback.className = 'feedback hidden';
        checkBtn.classList.remove('hidden');
        gotItBtn.classList.add('hidden');
        restartBtn.classList.remove('hidden');
    }

    function renderRU() {
        ruList.innerHTML = '';
        currentContent.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'ru-sentence';
            div.textContent = s.ru;
            div.dataset.index = i;
            ruList.appendChild(div);
        });
    }

    function renderEN() {
        enList.innerHTML = '';
        if (currentIndex === 0) {
            enList.innerHTML = '<div class="placeholder">Переведённые предложения появятся здесь</div>';
            return;
        }
        currentContent.slice(0, currentIndex).forEach(s => {
            const div = document.createElement('div');
            div.className = 'en-sentence';
            div.textContent = s.en;
            enList.appendChild(div);
        });
        enList.scrollTop = enList.scrollHeight;
    }

    function updateHighlight() {
        document.querySelectorAll('.ru-sentence').forEach(el => {
            el.classList.toggle('active', parseInt(el.dataset.index) === currentIndex);
        });
        const active = document.querySelector('.ru-sentence.active');
        if (active) {
            const behavior = mobileQuery.matches ? 'auto' : 'smooth';
            const block = mobileQuery.matches ? 'nearest' : 'center';
            active.scrollIntoView({ behavior, block });
        }
    }

    function saveProgress() {
        const prog = loadFromStorage(STORAGE_KEYS.PROGRESS, {});
        prog[activeTextId] = { currentIndex };
        saveToStorage(STORAGE_KEYS.PROGRESS, prog);
    }

    function checkAnswer() {
        if (isFinished || isWaitingForGotIt || !userInput.value.trim()) return;

        const userVal = normalize(userInput.value);
        const targetVal = normalize(currentContent[currentIndex].en);
        feedback.classList.add('hidden');

        if (userVal === targetVal) {
            currentIndex++;
            saveProgress();
            renderEN();
            if (currentIndex >= currentContent.length) {
                finishTrainer();
            } else {
                userInput.value = '';
                updateHighlight();
            }
        } else {
            isWaitingForGotIt = true;
            userInput.disabled = true;
            checkBtn.classList.add('hidden');
            gotItBtn.classList.remove('hidden');
            feedback.className = 'feedback error';
            feedback.innerHTML = `❌ Ошибка. Правильно:<br><strong>${currentContent[currentIndex].en}</strong>`;
        }
    }

    function handleGotIt() {
        currentIndex = Math.max(0, currentIndex - 1);
        saveProgress();
        
        isWaitingForGotIt = false;
        userInput.disabled = false;
        gotItBtn.classList.add('hidden');
        checkBtn.classList.remove('hidden');
        feedback.classList.add('hidden');
        
        renderEN(); // Перерисовка справа (удаляет верхнее)
        userInput.value = '';
        updateHighlight();
        userInput.focus();
    }

    function finishTrainer() {
        isFinished = true;
        userInput.style.display = 'none';
        checkBtn.classList.add('hidden');
        document.querySelectorAll('.ru-sentence').forEach(el => el.classList.remove('active'));
        feedback.className = 'feedback success';
        feedback.textContent = '🎉 Поздравляем! Весь текст успешно переведен.';
    }

    document.getElementById('restartBtn').onclick = () => {
        if (confirm('Сбросить прогресс по этому тексту?')) {
            currentIndex = 0;
            saveProgress();
            initTrainer();
        }
    };

    checkBtn.addEventListener('click', checkAnswer);
    gotItBtn.addEventListener('click', handleGotIt);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });
    userInput.addEventListener('focus', () => {
        syncViewportHeight();
        syncKeyboardOffset();
        setTimeout(keepActiveSentenceVisible, 60);
    });
    userInput.addEventListener('blur', () => {
        setTimeout(() => {
            syncViewportHeight();
            syncKeyboardOffset();
        }, 100);
    });

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            syncViewportHeight();
            syncKeyboardOffset();
            keepActiveSentenceVisible();
        });
        window.visualViewport.addEventListener('scroll', syncKeyboardOffset);
    }
    window.addEventListener('resize', () => {
        syncViewportHeight();
        syncKeyboardOffset();
    });

    // Init
    syncViewportHeight();
    syncKeyboardOffset();
    initStorage();
    initTrainer();
</script>

</body>
</html>
