<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="trainer-wrapper">
    <div class="app-header">
        <div class="header-actions">
            <button class="btn btn-secondary" id="openVocabulary">Словарный запас: 0</button>
            <button class="btn btn-primary" id="openManager">Выбрать текст</button>
        </div>
    </div>
    <div class="trainer-main">
        <div class="translation-panel">
            <div class="sentence-list" id="enList">
                <div class="placeholder">Переведённые предложения появятся здесь</div>
            </div>
        </div>
    </div>

    <div class="input-zone">
        <div class="current-task" id="currentTask">
            <div class="current-task-row">
                <div class="position-badge" id="positionBadge"></div>
                <div class="recorded-word" id="recordedWordDisplay" aria-live="polite"></div>
            </div>
            <div class="source-text" id="sourceText"></div>
        </div>
        <div class="composer-row">
            <textarea id="userInput" rows="1" placeholder="Введите перевод..." autocomplete="off"></textarea>
            <div class="composer-actions">
                <button type="button" id="checkBtn" class="btn-composer btn-composer-primary" aria-label="Проверить">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.59 5.58L20 12l-8-8-8 8z"/></svg>
                </button>
                <button type="button" id="gotItBtn" class="btn-composer btn-composer-warn hidden" aria-label="Понял">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                </button>
            </div>
        </div>
        <div id="feedback" class="feedback hidden"></div>
        <div class="hint">Нажмите Enter для проверки</div>
    </div>
</div>

<!-- Modal Manager -->
<div class="modal-overlay" id="managerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Управление текстами</h2>
            <button class="btn btn-sm btn-secondary" id="closeModal">✕</button>
        </div>
        <div class="modal-body">
            <label class="mode-switch" style="display:flex; margin-bottom: 12px;">
                <span>Режим:</span>
                <select id="trainingMode">
                    <option value="easy">Легкий</option>
                    <option value="normal">Нормальный</option>
                    <option value="hard">Сложный</option>
                </select>
            </label>
            <label class="theme-field">
                <span class="theme-field-label">Тёмная тема</span>
                <span class="theme-switch">
                    <input type="checkbox" id="themeToggle" class="theme-toggle-input" role="switch" aria-label="Тёмная тема">
                    <span class="theme-switch-track" aria-hidden="true"></span>
                </span>
            </label>
            <button class="btn btn-secondary" id="restartBtn" style="width:100%; margin-bottom: 10px;">Начать заново</button>
            <button class="btn btn-danger" id="clearStorageBtn" style="width:100%">Очистить сохранённые данные (прогресс, словарь)</button>

            <!-- List -->
            <h3 style="margin: 25px 0 10px; font-size: 1rem;">Сохраненные тексты</h3>
            <div id="textList"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="vocabularyModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Словарный запас</h2>
            <button class="btn btn-sm btn-secondary" id="closeVocabularyModal">✕</button>
        </div>
        <div class="modal-body">
            <p id="vocabularyCount" style="margin-top: 0; color: var(--text-muted);"></p>
            <div id="vocabularyList"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

    <script src="./script.js"></script>

</body>
</html>
